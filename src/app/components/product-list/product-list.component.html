<div class="products-page">
  <h1>أعمالنا</h1>
  <span class="page-sub">Our Work</span>

  <div class="filters">
    <button [class.active]="activeSector === ''" (click)="filterBy('')">الكل</button>
    <button *ngFor="let key of sectorKeys" [class.active]="activeSector === key" (click)="filterBy(key)">
      {{ sectorLabels[key] }}
    </button>
  </div>

  <div *ngIf="isLoading" class="loading">جاري التحميل...</div>

  <div *ngIf="!isLoading && products.length === 0" class="empty">
    لا توجد مشاريع في هذا التصنيف حاليًا
  </div>

  <div class="product-grid" *ngIf="!isLoading && products.length > 0">
    <a [routerLink]="['/products', p._id]" class="product-card" *ngFor="let p of products">
      <img [src]="imageUrl(p.images[0])" alt="{{ p.name }}" />
      <div class="card-body">
        <h3>{{ p.name }}</h3>
        <span class="location">{{ p.location }}</span>
        <span class="tag">{{ sectorLabels[p.sector] }}</span>
      </div>
    </a>
  </div>
</div>
