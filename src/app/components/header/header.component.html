<header class="site-header">
  <div class="site-header-bar">
    <a routerLink="/" class="brand-mark" (click)="closeMenu()">
      <span class="brand-mark-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="22"/>
          <path d="M24 10v28M14 16l20 16M34 16 14 32" />
        </svg>
      </span>
      <span class="brand-mark-text">
        <span class="brand-mark-ar">أثاث <em>هوم</em></span>
        <span class="brand-mark-en">ATHATH HOME</span>
      </span>
    </a>

    <button
      type="button"
      class="menu-btn"
      [class.is-open]="menuOpen"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="فتح القائمة">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <nav class="menu-panel" [class.is-open]="menuOpen">
    <a routerLink="/" (click)="closeMenu()">الرئيسية</a>
    <a routerLink="/products" (click)="closeMenu()">أعمالنا</a>
    <a routerLink="/" fragment="categories" (click)="closeMenu()">خدماتنا</a>
    <a routerLink="/" fragment="about" (click)="closeMenu()">عن أثاث هوم</a>
    <a routerLink="/" fragment="cta" (click)="closeMenu()">تواصل معنا</a>
  </nav>

  <div class="menu-backdrop" [class.is-open]="menuOpen" (click)="closeMenu()" aria-hidden="true"></div>
</header>
